            PALLETHOTEL_SE_NEXT_PUBLIC_FIREBASE_PROJECT_ID:techozon-fc682/PALLETHOTEL_SE_NEXT_PUBLIC_FIREBASE_PROJECT_ID
            PALLETHOTEL_SE_NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET:techozon-fc682/PALLETHOTEL_SE_NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
            PALLETHOTEL_SE_NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID:techozon-fc682/PALLETHOTEL_SE_NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
            PALLETHOTEL_SE_NEXT_PUBLIC_FIREBASE_APP_ID:techozon-fc682/PALLETHOTEL_SE_NEXT_PUBLIC_FIREBASE_APP_ID
            PALLETHOTEL_SE_NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID:techozon-fc682/PALLETHOTEL_SE_NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
